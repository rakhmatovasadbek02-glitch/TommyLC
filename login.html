<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TommyLC</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #990000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background texture */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 10% 10%, rgba(255,255,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 90%, rgba(255,255,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,0,0,0.3) 0%, transparent 70%);
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Brand — top right corner */
    .brand-corner {
      position: fixed;
      top: 28px; right: 36px;
      z-index: 10;
      text-align: right;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.5px;
      line-height: 1;
    }
    .brand-sub {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    /* Card */
    .login-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 44px 44px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 40px 100px rgba(153,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08);
      position: relative;
      z-index: 1;
    }

    /* Crimson top accent bar */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #FF0000, #CC0000);
      border-radius: 20px 20px 0 0;
    }

    .login-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #1A0000;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      color: #994444;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #994444;
      margin-bottom: 7px;
    }

    /* Phone input */
    .phone-wrap {
      display: flex;
      align-items: stretch;
      border: 1.5px solid #FFD0D0;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      transition: border-color 0.16s, box-shadow 0.16s;
    }
    .phone-wrap:focus-within {
      border-color: #FF0000;
      box-shadow: 0 0 0 3px rgba(255,0,0,0.10);
    }
    .phone-prefix {
      padding: 12px 14px;
      background: #FFF0F0;
      font-size: 14px;
      font-weight: 700;
      color: #330000;
      border-right: 1.5px solid #FFD0D0;
      white-space: nowrap;
      user-select: none;
      letter-spacing: 0.5px;
    }
    .phone-wrap input {
      border: none;
      outline: none;
      box-shadow: none !important;
      flex: 1;
      padding: 12px 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: #1A0000;
      background: #fff;
      letter-spacing: 1.5px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #FFD0D0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #1A0000;
      background: #fff;
      outline: none;
      transition: border-color 0.16s, box-shadow 0.16s;
    }
    input[type="password"]:focus {
      border-color: #FF0000;
      box-shadow: 0 0 0 3px rgba(255,0,0,0.10);
    }

    /* Error */
    .error-msg {
      background: #FFF0F0;
      color: #CC0000;
      border: 1px solid #FFD0D0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #FF0000;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      background: #CC0000;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(255,0,0,0.35);
    }
    .btn-login:active { transform: none; box-shadow: none; }

    /* Quick role buttons */
    .role-quick-btn {
      display: flex; align-items: center; gap: 10px;
      background: white;
      border: 1.5px solid #FFD0D0;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .role-quick-btn:hover {
      border-color: #FF0000;
      background: #FFF0F0;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255,0,0,0.12);
    }
    .rqb-icon { font-size: 20px; flex-shrink: 0; }
    .rqb-name { font-size: 13px; font-weight: 700; color: #1A0000; }
    .rqb-desc { font-size: 11px; color: #994444; margin-top: 1px; }
  </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<!-- Brand — top right -->
<div class="brand-corner">
  <div class="brand-name">TommyLC</div>
  <div class="brand-sub">Admin Portal</div>
</div>

<!-- Card -->
<div class="login-card">
  <h2>Welcome back</h2>
  <div class="subtitle">Sign in to continue</div>

  <div class="error-msg" id="errorMsg">
    <span>⚠️</span><span id="errorText">Invalid phone number or password.</span>
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <div class="phone-wrap">
      <div class="phone-prefix">+998</div>
      <input type="tel" id="loginPhone" placeholder="90 123 45 67"
        oninput="fmtPhone(this)" autocomplete="tel" maxlength="12">
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" onclick="doLogin()">Sign In →</button>

  <div style="display:flex;align-items:center;gap:12px;margin:24px 0 16px">
    <div style="flex:1;height:1px;background:#FFD0D0"></div>
    <span style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#994444">Quick Access</span>
    <div style="flex:1;height:1px;background:#FFD0D0"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <button class="role-quick-btn" onclick="quickLogin('CEO')">
      <span class="rqb-icon">👑</span>
      <div><div class="rqb-name">CEO</div><div class="rqb-desc">Full access</div></div>
    </button>
    <button class="role-quick-btn" onclick="quickLogin('Manager')">
      <span class="rqb-icon">🏢</span>
      <div><div class="rqb-name">Manager</div><div class="rqb-desc">Full access</div></div>
    </button>
    <button class="role-quick-btn" onclick="quickLogin('Head Admin')">
      <span class="rqb-icon">📋</span>
      <div><div class="rqb-name">Head Admin</div><div class="rqb-desc">No payments</div></div>
    </button>
    <button class="role-quick-btn" onclick="quickLogin('Admin')">
      <span class="rqb-icon">🗂</span>
      <div><div class="rqb-name">Admin</div><div class="rqb-desc">Students & schedule</div></div>
    </button>
  </div>
</div>

<script>
  function fmtPhone(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 9);
    let out = '';
    if (v.length > 0) out += v.slice(0, 2);
    if (v.length > 2) out += ' ' + v.slice(2, 5);
    if (v.length > 5) out += ' ' + v.slice(5, 7);
    if (v.length > 7) out += ' ' + v.slice(7, 9);
    input.value = out;
  }

  // Seed demo users
  const DEMO_USERS = [
    { id:'u1', firstName:'Alexandra', lastName:'Chen',     name:'Alexandra Chen',    phone:'90 000 00 01', password:'ceo123',     role:'CEO',        avatar:'AC' },
    { id:'u2', firstName:'Marcus',    lastName:'Dubois',   name:'Marcus Dubois',     phone:'90 000 00 02', password:'manager123', role:'Manager',    avatar:'MD' },
    { id:'u3', firstName:'Isabelle',  lastName:'Fontaine', name:'Isabelle Fontaine', phone:'90 000 00 03', password:'head123',    role:'Head Admin', avatar:'IF' },
    { id:'u4', firstName:'Karim',     lastName:'Bouazza',  name:'Karim Bouazza',     phone:'90 000 00 04', password:'admin123',   role:'Admin',      avatar:'KB' },
  ];

  if (!JSON.parse(localStorage.getItem('lc_users') || '[]').length)
    localStorage.setItem('lc_users', JSON.stringify(DEMO_USERS));

  if (JSON.parse(localStorage.getItem('lc_session') || 'null'))
    window.location.replace('index.html');

  function doLogin() {
    const rawPhone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value;
    const users    = JSON.parse(localStorage.getItem('lc_users') || '[]');

    const user = users.find(u => {
      const sp = (u.phone || '').replace(/\s/g, '');
      const ip = rawPhone.replace(/\s/g, '');
      return sp === ip && u.password === password;
    });

    const errMsg  = document.getElementById('errorMsg');
    const errText = document.getElementById('errorText');

    if (!user) {
      const phoneOnly = users.find(u => (u.phone||'').replace(/\s/g,'') === rawPhone.replace(/\s/g,''));
      errText.textContent = phoneOnly
        ? 'Incorrect password. Please try again.'
        : 'No staff member found with that phone number.';
      errMsg.classList.add('show');
      document.getElementById('loginPassword').value = '';
      return;
    }

    errMsg.classList.remove('show');
    localStorage.setItem('lc_session', JSON.stringify({
      id: user.id, name: user.name, role: user.role,
      avatar: user.avatar, loginTime: new Date().toISOString()
    }));
    window.location.replace('index.html');
  }

  function quickLogin(role) {
    const users = JSON.parse(localStorage.getItem('lc_users') || '[]');
    const user  = users.find(u => u.role === role);
    if (!user) { alert(`No ${role} account found.`); return; }
    localStorage.setItem('lc_session', JSON.stringify({
      id: user.id, name: user.name, role: user.role,
      avatar: user.avatar, loginTime: new Date().toISOString()
    }));
    window.location.replace('index.html');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
