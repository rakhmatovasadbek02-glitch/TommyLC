<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .summary-cards{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .sum-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;flex:1;min-width:140px;box-shadow:var(--shadow)}
    .sum-card-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .sum-card-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--text)}
    .sum-card.green .sum-card-val{color:var(--green)}
    .sum-card.red   .sum-card-val{color:var(--crimson)}
    .sum-card.amber .sum-card-val{color:var(--amber)}
    .inv-row{display:flex;align-items:center;gap:14px;padding:13px 20px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;transition:background 0.1s}
    .inv-row:hover{background:var(--crimson-soft)}
    .inv-row:last-child{border-bottom:none}
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Payments</div>
    <div class="topbar-right"><button class="btn btn-primary" onclick="openAdd()">➕ New Invoice</button></div>
  </div>
  <div class="page-content">
    <div class="summary-cards" id="summaryCards"></div>
    <div class="toolbar">
      <div class="search-bar"><span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search invoices…" oninput="renderInvoices()">
      </div>
      <select id="filterStatus" onchange="renderInvoices()" style="width:auto;padding:9px 14px">
        <option value="">All</option><option>Paid</option><option>Pending</option><option>Overdue</option>
      </select>
      <span class="text-muted" id="invoiceCount" style="margin-left:auto"></span>
    </div>
    <div class="card">
      <div id="invoiceList"></div>
    </div>
  </div>
</div>

<!-- Invoice modal -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal" style="width:560px">
    <div class="modal-header">
      <div class="modal-title" id="invModalTitle">New Invoice</div>
      <button class="modal-close" onclick="closeModal('invoiceModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editInvId">
      <div class="form-row">
        <div class="form-group"><label>Student *</label><select id="invStudent"><option value="">— Select —</option></select></div>
        <div class="form-group"><label>Status</label>
          <select id="invStatus"><option>Pending</option><option>Paid</option><option>Overdue</option></select>
        </div>
      </div>
      <div class="form-group"><label>Description *</label><input type="text" id="invDesc" placeholder="Monthly tuition — May 2026"></div>
      <div class="form-group"><label>Amount ($) *</label><input type="number" id="invAmount" placeholder="150" step="0.01" min="0"></div>
      <div class="form-row">
        <div class="form-group"><label>Due Date</label><input type="date" id="invDue"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="invNotes" placeholder="Any notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('invoiceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveInvoice()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('payments');
  renderSidebar('payments');
  let invoices=[], students=[];

  async function load() {
    [invoices, students] = await Promise.all([apiGet('/api/invoices'), apiGet('/api/students')]);
    renderSummary(); renderInvoices();
  }

  function renderSummary() {
    const paid     = invoices.filter(i=>i.status==='Paid').reduce((s,i)=>s+Number(i.total||0),0);
    const pending  = invoices.filter(i=>i.status==='Pending').reduce((s,i)=>s+Number(i.total||0),0);
    const overdue  = invoices.filter(i=>i.status==='Overdue').reduce((s,i)=>s+Number(i.total||0),0);
    document.getElementById('summaryCards').innerHTML = `
      <div class="sum-card green"><div class="sum-card-label">Paid</div><div class="sum-card-val">$${paid.toFixed(0)}</div></div>
      <div class="sum-card"><div class="sum-card-label">Pending</div><div class="sum-card-val">$${pending.toFixed(0)}</div></div>
      <div class="sum-card red"><div class="sum-card-label">Overdue</div><div class="sum-card-val">$${overdue.toFixed(0)}</div></div>
      <div class="sum-card"><div class="sum-card-label">Total Invoices</div><div class="sum-card-val">${invoices.length}</div></div>`;
  }

  function renderInvoices() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fs = document.getElementById('filterStatus').value;
    const filtered = invoices.filter(i => {
      const stu = students.find(s=>s.id===i.studentId);
      const name = stu ? stu.firstName+' '+stu.lastName : '';
      return (!q || name.toLowerCase().includes(q) || (i.desc||'').toLowerCase().includes(q))
          && (!fs || i.status === fs);
    });
    document.getElementById('invoiceCount').textContent = `${filtered.length} invoice${filtered.length!==1?'s':''}`;
    const STATUS_COL = { Paid:'badge-green', Pending:'badge-gold', Overdue:'badge-red' };
    const el = document.getElementById('invoiceList');
    if (!filtered.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">💳</div><p>No invoices found.</p></div>'; return; }
    el.innerHTML = filtered.map(i => {
      const stu  = students.find(s=>s.id===i.studentId);
      const name = stu ? stu.firstName+' '+stu.lastName : 'Unknown';
      return `<div class="inv-row" onclick="editInvoice('${i.id}')">
        <div class="avatar" style="background:${avatarColor(name)};width:36px;height:36px;font-size:13px;flex-shrink:0">${initials(name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600">${name}</div>
          <div style="font-size:12px;color:var(--muted)">${i.desc||'—'}</div>
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:900">$${Number(i.total||0).toFixed(0)}</div>
        <span class="badge ${STATUS_COL[i.status]||'badge-grey'}">${i.status}</span>
        ${i.dueDate?`<div style="font-size:11px;color:var(--muted)">${formatDate(i.dueDate)}</div>`:''}
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteInvoice('${i.id}')">🗑</button>
      </div>`;
    }).join('');
  }

  async function openAdd() {
    clearForm(); populateStudentSelect();
    document.getElementById('invModalTitle').textContent='New Invoice';
    openModal('invoiceModal');
  }

  function editInvoice(id) {
    const i=invoices.find(i=>i.id===id); if(!i) return;
    clearForm(); populateStudentSelect();
    document.getElementById('editInvId').value=id;
    document.getElementById('invStudent').value=i.studentId||'';
    document.getElementById('invStatus').value=i.status||'Pending';
    document.getElementById('invDesc').value=i.desc||'';
    document.getElementById('invAmount').value=i.total||'';
    document.getElementById('invDue').value=i.dueDate?i.dueDate.split('T')[0]:'';
    document.getElementById('invNotes').value=i.notes||'';
    document.getElementById('invModalTitle').textContent='Edit Invoice';
    openModal('invoiceModal');
  }

  async function saveInvoice() {
    const studentId=document.getElementById('invStudent').value;
    const desc=document.getElementById('invDesc').value.trim();
    const amount=document.getElementById('invAmount').value;
    if(!studentId||!desc||!amount){showToast('Student, description and amount required.','error');return;}
    const id=document.getElementById('editInvId').value;
    const data={studentId,desc,total:Number(amount),
      status:document.getElementById('invStatus').value,
      dueDate:document.getElementById('invDue').value||null,
      notes:document.getElementById('invNotes').value.trim(),items:[]};
    try {
      if(id){await apiPut('/api/invoices/'+id,data);logActivity(`Updated invoice`,'');}
      else{data.id=genId();data.number='INV-'+Date.now().toString().slice(-6);await apiPost('/api/invoices',data);logActivity(`Created invoice for ${students.find(s=>s.id===studentId)?.firstName||''}`,'green');}
      closeModal('invoiceModal'); await load(); showToast(id?'Invoice updated!':'Invoice created!');
    } catch(e){showToast('Error saving.','error');}
  }

  async function deleteInvoice(id) {
    if(!confirm('Delete this invoice?'))return;
    await apiDelete('/api/invoices/'+id);
    await load(); showToast('Deleted.','error');
  }

  function populateStudentSelect() {
    const sel=document.getElementById('invStudent');
    sel.innerHTML='<option value="">— Select student —</option>'+
      students.filter(s=>s.status==='Active'||s.status==='Trial').map(s=>`<option value="${s.id}">${s.firstName} ${s.lastName}</option>`).join('');
  }

  function clearForm(){
    ['editInvId','invStudent','invDesc','invAmount','invDue','invNotes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('invStatus').value='Pending';
  }

  load();
</script>
</body>
</html>
