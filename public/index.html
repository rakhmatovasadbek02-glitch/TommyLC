<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── Welcome banner ── */
    .welcome-banner {
      background: linear-gradient(135deg, #990000 0%, #CC0000 100%);
      border-radius: var(--radius);
      padding: 24px 32px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .welcome-banner::after {
      content: '🏫';
      position: absolute; right: 28px; top: 50%;
      transform: translateY(-50%);
      font-size: 72px; opacity: 0.08;
    }
    .welcome-banner h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: white; margin-bottom: 3px;
    }
    .welcome-banner p { color: rgba(255,255,255,0.6); font-size: 13px; }
    .date-chip {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.92);
      padding: 6px 14px; border-radius: 100px;
      font-size: 13px; font-weight: 500; white-space: nowrap;
    }

    /* ── Stat boxes ── */
    .stat-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px 24px;
      flex: 1;
      min-width: 140px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: box-shadow 0.16s, transform 0.16s;
    }
    .stat-box:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .stat-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--crimson);
    }
    .stat-box.green::before  { background: var(--green); }
    .stat-box.blue::before   { background: var(--blue); }
    .stat-box.amber::before  { background: var(--amber); }
    .stat-box.purple::before { background: #7C3AED; }

    .stat-box-icon {
      position: absolute; top: 16px; right: 16px;
      font-size: 26px; opacity: 0.11;
    }
    .stat-box-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .stat-box-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px; color: var(--text); line-height: 1;
    }
    .stat-box-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Timetable ── */
    .timetable-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }
    .timetable-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 900; color: var(--text);
    }

    /* Day type tabs */
    .day-tabs { display:flex; gap:4px; }
    .day-tab {
      padding: 7px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border);
      background: white; color: var(--muted);
      cursor: pointer; transition: all 0.14s;
      font-family: 'DM Sans', sans-serif;
    }
    .day-tab:hover { border-color: var(--crimson); color: var(--crimson); }
    .day-tab.active { background: var(--crimson); color: white; border-color: var(--crimson); }

    /* Custom day picker chips — radio, single select */
    .custom-day-row {
      display: none; gap: 6px; flex-wrap: wrap;
      margin-bottom: 16px; align-items: center;
    }
    .custom-day-row.show { display: flex; }
    .cday-chip input[type="radio"],
    .cday-chip input[type="checkbox"] { display:none; }
    .cday-chip span {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 34px;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all 0.14s; background: white; color: var(--muted);
    }
    .cday-chip input:checked + span { background: var(--crimson); color: white; border-color: var(--crimson); }
    .cday-chip span:hover { border-color: var(--crimson); color: var(--crimson); }
    .cday-chip input:checked + span:hover { color: white; }

    .timetable-wrap {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>

<nav class="sidebar"></nav>

<div class="main">
  <div class="topbar">
    <div class="page-title">Dashboard</div>
    <div class="topbar-right">
      <span class="text-muted" id="currentDate"></span>
    </div>
  </div>

  <div class="page-content">

    <!-- Welcome -->
    <div class="welcome-banner">
      <div>
        <h2 id="welcomeMsg">Good morning 👋</h2>
        <p>Here's what's happening at Tommy Learning Center today.</p>
      </div>
      <div class="date-chip" id="dateBadge"></div>
    </div>

    <!-- Role-filtered stat boxes -->
    <div class="stat-row" id="statRow"></div>

    <!-- Timetable -->
    <div class="timetable-header">
      <div class="timetable-title">Timetable</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="day-tabs">
          <button class="day-tab active" onclick="setDayTab('odd',this)">Odd Days</button>
          <button class="day-tab" onclick="setDayTab('even',this)">Even Days</button>
          <button class="day-tab" onclick="setDayTab('custom',this)">Custom</button>
        </div>
        <a href="groups.html" class="btn btn-outline btn-sm">All Groups →</a>
      </div>
    </div>

    <!-- Custom day picker (radio = one day at a time) -->
    <div class="custom-day-row" id="customDayRow">
      <span style="font-size:12px;font-weight:700;color:var(--muted);margin-right:4px">Day:</span>
      <label class="cday-chip"><input type="radio" name="customDay" value="1" onchange="renderTimetable()"><span>Mon</span></label>
      <label class="cday-chip"><input type="radio" name="customDay" value="2" onchange="renderTimetable()"><span>Tue</span></label>
      <label class="cday-chip"><input type="radio" name="customDay" value="3" onchange="renderTimetable()"><span>Wed</span></label>
      <label class="cday-chip"><input type="radio" name="customDay" value="4" onchange="renderTimetable()"><span>Thu</span></label>
      <label class="cday-chip"><input type="radio" name="customDay" value="5" onchange="renderTimetable()"><span>Fri</span></label>
      <label class="cday-chip"><input type="radio" name="customDay" value="6" onchange="renderTimetable()"><span>Sat</span></label>
      <label class="cday-chip"><input type="radio" name="customDay" value="0" onchange="renderTimetable()"><span>Sun</span></label>
    </div>

    <div class="timetable-wrap">
      <div id="ttGrid"></div>
    </div>

  </div>
</div>

<!-- Class detail popup (click on timetable block) -->
<div class="modal-overlay" id="classDetailModal">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <div class="modal-title" id="cdTitle">Class Detail</div>
      <button class="modal-close" onclick="closeModal('classDetailModal')">✕</button>
    </div>
    <div class="modal-body" id="cdBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('classDetailModal')">Close</button>
      <button class="btn btn-primary" id="cdGoBtn" onclick="window.location.href='groups.html'">👥 Open Group →</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('dashboard');
  renderSidebar('dashboard');
  checkAccessDeniedMessage();

  const session = getSession();
  const role    = getRole();
  const now     = new Date();

  /* ── Date header ── */
  document.getElementById('currentDate').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('dateBadge').textContent =
    now.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

  /* ── Welcome greeting ── */
  const firstName = session ? session.name.split(' ')[0] : 'there';
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('welcomeMsg').textContent = `${greeting}, ${firstName} 👋`;

  /* ══════════════════════════════════
     ROLE-FILTERED STAT BOXES
  ══════════════════════════════════ */
  const STAT_DEFS = [
    {
      id: 'statActive', label: 'Active Students', icon: '👤',
      color: '',
      roles: ['CEO'],
      calc: () => (window._students || []).filter(s => s.status === 'Active').length,
      sub: 'currently enrolled'
    },
    {
      id: 'statDebtors', label: 'Debtors', icon: '⚠️',
      color: 'red',
      roles: ['CEO'],
      calc: () => {
        const inv = window._invoices || [];
        const ids = new Set(inv.filter(i => i.status === 'Pending' || i.status === 'Overdue').map(i => i.studentId));
        return ids.size;
      },
      sub: 'unpaid invoices'
    },
    {
      id: 'statPaid', label: 'Paid', icon: '✅',
      color: 'green',
      roles: ['CEO'],
      calc: () => (window._invoices || []).filter(i => i.status === 'Paid').length,
      sub: 'invoices settled'
    },
    {
      id: 'statLead', label: 'Leads', icon: '🎯',
      color: 'purple',
      roles: ['CEO'],
      calc: () => (window._students || []).filter(s => s.status === 'Lead').length,
      sub: 'potential students'
    },
    {
      id: 'statTrial', label: 'Trial', icon: '🔬',
      color: 'amber',
      roles: ['CEO'],
      calc: () => (window._students || []).filter(s => s.status === 'Trial').length,
      sub: 'on trial period'
    },
    {
      id: 'statAbsent', label: 'Absent Today', icon: '🚫',
      color: 'red',
      roles: ['CEO'],
      calc: () => window._absentToday || 0,
      sub: 'not in class today'
    },
  ];
  function renderStats() {
    const row = document.getElementById('statRow');
    row.innerHTML = STAT_DEFS
      .filter(s => s.roles.includes(role))
      .map(s => `
        <div class="stat-box ${s.color}">
          <span class="stat-box-icon">${s.icon}</span>
          <div class="stat-box-label">${s.label}</div>
          <div class="stat-box-value" id="${s.id}">—</div>
          <div class="stat-box-sub">${s.sub}</div>
        </div>
      `).join('');

    STAT_DEFS.filter(s => s.roles.includes(role)).forEach(s => {
      const el = document.getElementById(s.id);
      if (el) el.textContent = s.calc();
    });
  }

  /* ══════════════════════════════════
     TIMETABLE — Classrooms × Time slots
     Columns = time slots (08:00–20:00)
     Rows    = classrooms
     Filter  = odd / even / custom (single day)
     Auto-detect today's type on load
  ══════════════════════════════════ */
  const PALETTE = ['#FF0000','#1D4ED8','#1E6B45','#7C3AED','#A05C00','#0891B2','#BE185D'];
  let dayFilter = 'odd';

  function classColor(id) {
    let h = 0;
    for (let c of (id||'?')) h = (h<<5)-h+c.charCodeAt(0);
    return PALETTE[Math.abs(h) % PALETTE.length];
  }

  /* Auto-detect: day of week → odd or even
     Odd  days = Mon (1), Wed (3), Fri (5)
     Even days = Tue (2), Thu (4), Sat (6)
     Sun (0)   → fallback to odd */
  function autoDetectTab() {
    const dow = now.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
    const evenDays = [2, 4, 6]; // Tue, Thu, Sat
    return evenDays.includes(dow) ? 'even' : 'odd';
  }

  function setDayTab(type, btn) {
    dayFilter = type;
    document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('customDayRow').classList.toggle('show', type === 'custom');
    renderTimetable();
  }

  /* For custom: returns the single selected DOW (0-6), or null */
  function getCustomDow() {
    const r = document.querySelector('input[name="customDay"]:checked');
    return r ? Number(r.value) : null;
  }

  /* Does a class appear in the current view?
     For odd/even: match by schedType
     For custom:   match by schedType=custom AND customDays includes selected DOW */
  function classVisible(cls) {
    if (dayFilter === 'odd')    return cls.schedType === 'odd';
    if (dayFilter === 'even')   return cls.schedType === 'even';
    if (dayFilter === 'custom') {
      const dow = getCustomDow();
      return dow !== null && cls.schedType === 'custom' && (cls.customDays||[]).includes(dow);
    }
    return false;
  }

  function renderTimetable() {
    const rooms   = window._classrooms|| [];
    const classes = window._groups    || [];
    const grid    = document.getElementById('ttGrid');

    if (!rooms.length) {
      grid.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">
        <div style="font-size:32px;margin-bottom:10px">🏛</div>
        <p>No classrooms yet.</p>
        <a href="classrooms.html" class="btn btn-outline btn-sm" style="margin-top:10px">Add Classrooms</a>
      </div>`;
      return;
    }
    if (dayFilter === 'custom' && getCustomDow() === null) {
      grid.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">
        <p>Select a day above to view the groups.</p>
      </div>`;
      return;
    }

    const visibleClasses = classes.filter(classVisible);

    /* ── Build time range ──
       Default 09:00–18:00 in 30-min steps.
       Expand if any group starts earlier or ends later. */
    function timeToMin(t) {
      if (!t) return 0;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + (m || 0);
    }
    function minToTime(m) {
      return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    }

    let rangeStart = 9 * 60;   // 09:00
    let rangeEnd   = 18 * 60;  // 18:00

    // Collect all significant times (starts and ends of groups)
    const significantMins = new Set();
    visibleClasses.forEach(cls => {
      const start = timeToMin(cls.time);
      const end   = start + Number(cls.duration || 60);
      significantMins.add(start);
      significantMins.add(end);
      // Expand range if needed
      const slotStart = Math.floor(start / 60) * 60; // round to hour
      const slotEnd   = Math.ceil(end / 60) * 60;
      if (start < rangeStart) rangeStart = Math.floor(start / 60) * 60;
      if (end   > rangeEnd)   rangeEnd   = Math.ceil(end / 60) * 60;
    });

    // Build slots: every 30 minutes within the range
    const slots = [];
    for (let m = rangeStart; m < rangeEnd; m += 30) slots.push(m);

    /* ── Determine which slots are "active" (have a group starting or spanning) ── */
    function slotHasClass(slotMin, roomName) {
      return visibleClasses.some(cls => {
        if (roomName && cls.room !== roomName) return false;
        const start = timeToMin(cls.time);
        const end   = start + Number(cls.duration || 60);
        return slotMin >= start && slotMin < end;
      });
    }

    // Per-room: which slots are occupied
    function slotsOccupied(roomName) {
      const set = new Set();
      visibleClasses.filter(c => c.room === roomName).forEach(cls => {
        const start = timeToMin(cls.time);
        const end   = start + Number(cls.duration || 60);
        slots.forEach(s => { if (s >= start && s < end) set.add(s); });
      });
      return set;
    }

    // Globally: which slots are occupied by ANY room
    const globalOccupied = new Set();
    visibleClasses.forEach(cls => {
      const start = timeToMin(cls.time);
      const end   = start + Number(cls.duration || 60);
      slots.forEach(s => { if (s >= start && s < end) globalOccupied.add(s); });
    });

    /* Column widths: occupied = 110px, empty = 40px */
    const COL_BUSY  = 110;
    const COL_EMPTY = 55;
    const ROOM_W    = 130;

    function colW(slotMin) {
      return globalOccupied.has(slotMin) ? COL_BUSY : COL_EMPTY;
    }

    /* ── Header ── */
    let html = `<div style="display:flex;position:sticky;top:0;z-index:5;">
      <div style="width:${ROOM_W}px;flex-shrink:0;background:var(--crimson);padding:12px 16px;
        font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
        color:rgba(255,255,255,0.65);border-right:1px solid rgba(255,255,255,0.15);">
        Classroom
      </div>
      ${slots.map(s => {
        const w = colW(s);
        const label = minToTime(s);
        const isHour = s % 60 === 0;
        return `<div style="width:${w}px;flex-shrink:0;background:var(--crimson);
          padding:10px 4px;text-align:center;
          border-right:1px solid rgba(255,255,255,0.12);overflow:hidden;">
          <div style="font-size:${isHour?12:10}px;font-weight:${isHour?700:400};
            color:${isHour?'#fff':'rgba(255,255,255,0.6)'};
            white-space:nowrap;overflow:hidden;text-overflow:clip;">${label}</div>
        </div>`;
      }).join('')}
    </div>`;

    /* ── Room rows ── */
    rooms.forEach(room => {
      const roomClasses = visibleClasses.filter(c => c.room === room.name);

      html += `<div style="display:flex;border-bottom:1px solid var(--border);">
        <div style="width:${ROOM_W}px;flex-shrink:0;padding:14px 16px;
          border-right:1px solid var(--border);background:var(--crimson-soft);
          display:flex;flex-direction:column;justify-content:center;">
          <div style="font-weight:700;font-size:14px;color:var(--crimson)">${room.name}</div>
          ${room.capacity?`<div style="font-size:11px;color:var(--muted);margin-top:2px">Cap. ${room.capacity}</div>`:''}
        </div>
        ${slots.map((s, si) => {
          const w = colW(s);
          // Find a class that STARTS at this exact slot
          const startingHere = roomClasses.filter(cls => timeToMin(cls.time) === s);
          // Is this slot covered by a class that started earlier? (skip rendering — handled by width span)
          const coveredByEarlier = roomClasses.some(cls => {
            const cStart = timeToMin(cls.time);
            const cEnd   = cStart + Number(cls.duration || 60);
            return s > cStart && s < cEnd;
          });

          if (coveredByEarlier) {
            // Render a zero-width spacer so flex layout stays correct
            return `<div style="width:${w}px;flex-shrink:0;border-right:1px solid var(--border);min-height:72px;background:transparent;pointer-events:none;"></div>`;
          }

          return `<div style="width:${w}px;flex-shrink:0;border-right:1px solid var(--border);
            padding:4px;min-height:72px;cursor:pointer;transition:background 0.1s;position:relative;"
            onmouseover="this.style.background='#FFF0F0'" onmouseout="this.style.background=''">
            ${startingHere.map(cls => {
              const c   = classColor(cls.id);
              const dur = Number(cls.duration || 90);
              const cStart = timeToMin(cls.time);
              const cEnd   = cStart + dur;
              let blockW = 0;
              slots.forEach(s => { if (s >= cStart && s < cEnd) blockW += colW(s); });
              const endT = minToTime(cStart + dur);
              return `<div onclick="window.location.href='group.html?id=${cls.id}'"
                style="position:absolute;top:4px;left:3px;
                  width:${Math.max(blockW - 8, 30)}px;bottom:4px;min-height:40px;
                  background:${c}18;border-left:3px solid ${c};border-radius:6px;
                  padding:4px 6px;cursor:pointer;overflow:hidden;z-index:2;box-sizing:border-box;"
                onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
                <div style="font-weight:700;font-size:11px;color:${c};
                  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">
                  ${cls.name}
                </div>
                <div style="font-size:10px;color:${c};opacity:0.75;white-space:nowrap;margin-top:1px">
                  ${cls.time}–${endT}
                </div>
                ${cls.currentUnit ? `<div style="font-size:9px;font-weight:700;color:white;
                  background:${c};display:inline-block;padding:1px 5px;border-radius:3px;margin-top:2px">
                  ${cls.currentUnit}
                </div>` : ''}
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    });

    grid.innerHTML = `<div style="overflow-x:auto;min-width:100%;">${html}</div>`;
  }

  function goToGroups() { window.location.href = 'groups.html'; }

  function showClassDetail(id) {
    const c = (window._groups || []).find(c => c.id === id);
    if (!c) return;
    const SCHED = { odd:'Odd days', even:'Even days', custom:'Custom' };
    const LANG  = { UZ:'🇺🇿 Uzbek', RU:'🇷🇺 Russian' };
    const enrolled = (c.studentIds || []).length;

    // Calculate end time
    const endTime = (() => {
      if (!c.time) return '';
      const [h,m] = c.time.split(':').map(Number);
      const e = h*60+(m||0)+(c.duration||90);
      return `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
    })();

    document.getElementById('cdTitle').textContent = c.name;
    document.getElementById('cdBody').innerHTML = `
      <div class="grid-2">
        <div class="form-group"><label>Schedule</label><div style="font-weight:600">${SCHED[c.schedType]||'—'}</div></div>
        <div class="form-group"><label>Time</label><div style="font-weight:600">${c.time||'—'}${endTime?' – '+endTime:''}</div></div>
        <div class="form-group"><label>Teacher</label><div style="font-weight:600">${c.teacher||'—'}</div></div>
        <div class="form-group"><label>Room</label><div style="font-weight:600">${c.room||'—'}</div></div>
        <div class="form-group"><label>Level</label><div style="font-weight:600">${c.level||'—'}</div></div>
        <div class="form-group"><label>Language</label><div style="font-weight:600">${LANG[c.lang]||'—'}</div></div>
        <div class="form-group"><label>Students</label><div style="font-weight:600">${enrolled}</div></div>
        <div class="form-group"><label>Since</label><div style="font-weight:600">${formatDate(c.startDate)}</div></div>
      </div>
    `;
    // Update footer button to go directly to groups page
    document.getElementById('cdGoBtn').onclick = () => window.location.href = 'groups.html';
    openModal('classDetailModal');
  }

  /* ── Init ── */
  async function init() {
    try {
      const [groups, classrooms, students, invoices] = await Promise.all([
        apiGet('/api/groups'), apiGet('/api/classrooms'),
        apiGet('/api/students'), apiGet('/api/invoices')
      ]);
      window._groups     = groups;
      window._classrooms = classrooms;
      window._students   = students;
      window._invoices   = invoices;

      // Fetch today's attendance for all groups and count unique absent students
      const today = new Date().toISOString().split('T')[0];
      const attResults = await Promise.all(
        groups.map(g => apiGet(`/api/attendance/${g.id}/${today}`).catch(() => []))
      );
      const absentIds = new Set();
      attResults.forEach(records => {
        records.filter(r => r.status === 'absent').forEach(r => absentIds.add(r.studentId));
      });
      window._absentToday = absentIds.size;

    } catch(e) {
      window._groups = []; window._classrooms = [];
      window._students = []; window._invoices = [];
      window._absentToday = 0;
    }
    renderStats();
    const autoTab = autoDetectTab();
    dayFilter = autoTab;
    document.querySelectorAll('.day-tab').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase().startsWith(autoTab));
    });
    renderTimetable();
  }
  init();
</script>
</body>
</html>
